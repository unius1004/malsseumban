<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>대화하기</title>

  <!-- PWA 설정 -->
  <meta name="theme-color" content="#1D4ED8"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="말씀판"/>

  <!-- PWA 매니페스트 -->
  <link rel="manifest" href="manifest.json"/>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif; background: #F0F4FF; min-height: 100vh; max-width: 520px; margin: 0 auto; }

    #header { background: #1D4ED8; padding: 16px 20px; text-align: center; }
    #header h1 { font-size: 22px; font-weight: 700; color: #fff; }
    #header p  { font-size: 13px; color: #BFDBFE; margin-top: 4px; }

    #spoken-bar { display: none; background: #1D4ED8; margin: 0 16px; border-radius: 0 0 16px 16px; padding: 10px 16px; text-align: center; color: #fff; font-size: 16px; font-weight: 600; }

    #tabs { display: flex; background: #fff; border-bottom: 1px solid #E2E8F0; }
    .tab-btn { flex: 1; padding: 16px 4px; font-size: 17px; font-weight: 500; border: none; border-bottom: 3px solid transparent; background: #F8FAFC; color: #64748B; cursor: pointer; }
    .tab-btn.active { font-weight: 700; border-bottom-color: #3B82F6; background: #EFF6FF; color: #1D4ED8; }

    .panel { display: none; padding: 16px; }
    .panel.active { display: block; }

    .hint { text-align: center; color: #475569; font-size: 15px; margin-bottom: 14px; }

    /* 예/아니오 */
    #yesno-main { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .yn-btn { border: none; border-radius: 24px; padding: 36px 0; font-size: 50px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; box-shadow: 0 4px 14px rgba(0,0,0,0.15); transition: transform 0.1s; }
    .yn-btn span.lbl { font-size: 32px; font-weight: 800; color: #fff; }
    .yn-btn:active { transform: scale(0.94); }
    #yesno-sub { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
    .sub-btn { border: none; border-radius: 14px; padding: 18px 8px; font-size: 19px; font-weight: 700; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: transform 0.1s; }
    .sub-btn:active { transform: scale(0.94); }

    /* 그리드 버튼 */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .big-btn { border: none; border-radius: 20px; padding: 18px 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; box-shadow: 0 3px 10px rgba(0,0,0,0.12); min-height: 110px; justify-content: center; transition: transform 0.1s; }
    .big-btn:active { transform: scale(0.94); }
    .big-btn .ico { font-size: 40px; }
    .big-btn .lbl { font-size: 19px; font-weight: 700; color: #1e293b; text-align: center; line-height: 1.3; }

    /* 통증 */
    #pain-level { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .pain-lvl-btn { border: 3px solid transparent; border-radius: 14px; padding: 14px 4px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: transform 0.1s; }
    .pain-lvl-btn:active { transform: scale(0.94); }
    .pain-lvl-btn .ico { font-size: 28px; }
    .pain-lvl-btn .lbl { font-size: 22px; font-weight: 700; }
    #pain-hint { text-align: center; font-size: 12px; color: #94A3B8; margin-top: 8px; }
    #back-btn { background: #E2E8F0; border: none; border-radius: 8px; padding: 5px 12px; cursor: pointer; font-size: 13px; margin-left: 10px; }

    /* 감정 섹션 타이틀 */
    .sec-title { text-align: center; color: #475569; font-size: 15px; margin: 16px 0 10px; }

    footer { text-align: center; padding: 12px 0 28px; color: #94A3B8; font-size: 12px; }
  </style>
</head>
<body>

<div id="header">
  <h1>💬 대화하기</h1>
  <p>버튼을 누르면 소리로 말해드려요</p>
</div>

<div id="spoken-bar">🔊 "<span id="spoken-text"></span>"</div>

<div id="tabs">
  <button class="tab-btn active" onclick="showTab('yesno')">✅ 예/아니오</button>
  <button class="tab-btn" onclick="showTab('needs')">🙋 필요해요</button>
  <button class="tab-btn" onclick="showTab('pain')">😣 아파요</button>
  <button class="tab-btn" onclick="showTab('emotion')">😊 감정</button>
</div>

<!-- 예/아니오 -->
<div id="tab-yesno" class="panel active">
  <p class="hint" style="margin-top:14px">질문에 대답할 때 눌러주세요</p>
  <div id="yesno-main">
    <button class="yn-btn" style="background:#22C55E" onclick="say('네')">
      <span>👍</span><span class="lbl">네</span>
    </button>
    <button class="yn-btn" style="background:#EF4444" onclick="say('아니요')">
      <span>👎</span><span class="lbl">아니요</span>
    </button>
  </div>
  <div id="yesno-sub">
    <button class="sub-btn" style="background:#F59E0B" onclick="say('잠깐만요')">⏳ 잠깐만요</button>
    <button class="sub-btn" style="background:#8B5CF6" onclick="say('잘 모르겠어요')">🤔 모르겠어요</button>
    <button class="sub-btn" style="background:#64748B" onclick="say('다시 말해주세요')">🔁 다시 말해요</button>
    <button class="sub-btn" style="background:#EC4899" onclick="say('불러주세요')">📣 불러주세요</button>
  </div>
</div>

<!-- 필요해요 -->
<div id="tab-needs" class="panel">
  <div class="grid2" style="margin-top:4px">
    <button class="big-btn" style="background:#4FC3F7" onclick="say('물 주세요')"><span class="ico">💧</span><span class="lbl">물 주세요</span></button>
    <button class="big-btn" style="background:#81C784" onclick="say('밥 먹고 싶어요')"><span class="ico">🍚</span><span class="lbl">밥 먹고 싶어요</span></button>
    <button class="big-btn" style="background:#FFB74D" onclick="say('화장실 가고 싶어요')"><span class="ico">🚽</span><span class="lbl">화장실 가고 싶어요</span></button>
    <button class="big-btn" style="background:#FF7043" onclick="say('더워요')"><span class="ico">🥵</span><span class="lbl">더워요</span></button>
    <button class="big-btn" style="background:#64B5F6" onclick="say('추워요')"><span class="ico">🥶</span><span class="lbl">추워요</span></button>
    <button class="big-btn" style="background:#CE93D8" onclick="say('약 주세요')"><span class="ico">💊</span><span class="lbl">약 주세요</span></button>
    <button class="big-btn" style="background:#A5D6A7" onclick="say('눕고 싶어요')"><span class="ico">🛏️</span><span class="lbl">눕고 싶어요</span></button>
    <button class="big-btn" style="background:#90CAF9" onclick="say('TV 켜주세요')"><span class="ico">📺</span><span class="lbl">TV 켜주세요</span></button>
    <button class="big-btn" style="background:#BCAAA4" onclick="say('조용히 해주세요')"><span class="ico">🔇</span><span class="lbl">조용히 해주세요</span></button>
    <button class="big-btn" style="background:#F48FB1" onclick="say('가족 보고 싶어요')"><span class="ico">👨‍👩‍👦</span><span class="lbl">가족 보고 싶어요</span></button>
  </div>
</div>

<!-- 아파요 -->
<div id="tab-pain" class="panel">
  <div id="pain-parts">
    <p class="hint" style="margin-top:4px">어디가 아프신지 눌러주세요</p>
    <div class="grid2">
      <button class="big-btn" style="background:#EF9A9A" onclick="selectPart('입/목')"><span class="ico">🗣️</span><span class="lbl">입/목</span></button>
      <button class="big-btn" style="background:#CE93D8" onclick="selectPart('머리')"><span class="ico">🧠</span><span class="lbl">머리</span></button>
      <button class="big-btn" style="background:#FFCC80" onclick="selectPart('팔')"><span class="ico">💪</span><span class="lbl">팔</span></button>
      <button class="big-btn" style="background:#A5D6A7" onclick="selectPart('다리')"><span class="ico">🦵</span><span class="lbl">다리</span></button>
      <button class="big-btn" style="background:#F48FB1" onclick="selectPart('가슴')"><span class="ico">🫀</span><span class="lbl">가슴</span></button>
      <button class="big-btn" style="background:#90CAF9" onclick="selectPart('배')"><span class="ico">🫃</span><span class="lbl">배</span></button>
      <button class="big-btn" style="background:#80CBC4" onclick="selectPart('허리/등')"><span class="ico">🔙</span><span class="lbl">허리/등</span></button>
      <button class="big-btn" style="background:#EF9A9A" onclick="selectPart('전체적으로')"><span class="ico">😣</span><span class="lbl">전체적으로</span></button>
    </div>
  </div>
  <div id="pain-level-section" style="display:none">
    <div style="text-align:center; margin-bottom:14px">
      <span style="font-size:20px;color:#475569">부위: </span>
      <span id="selected-part" style="font-size:22px;font-weight:700;color:#1D4ED8"></span>
      <button id="back-btn" onclick="backToParts()" style="font-size:20px;padding:6px 14px">다시 선택</button>
    </div>
    <p class="hint">얼마나 아프신지 선택해주세요</p>
    <div id="pain-level">
      <button class="pain-lvl-btn" style="background:#A5D6A7" onclick="sayPain(1)"><span class="ico">😌</span><span class="lbl">1단계</span></button>
      <button class="pain-lvl-btn" style="background:#C8E6C9" onclick="sayPain(2)"><span class="ico">😕</span><span class="lbl">2단계</span></button>
      <button class="pain-lvl-btn" style="background:#FFE082" onclick="sayPain(3)"><span class="ico">😣</span><span class="lbl">3단계</span></button>
      <button class="pain-lvl-btn" style="background:#FFAB40" onclick="sayPain(4)"><span class="ico">😖</span><span class="lbl">4단계</span></button>
      <button class="pain-lvl-btn" style="background:#EF9A9A" onclick="sayPain(5)"><span class="ico">😱</span><span class="lbl">5단계</span></button>
    </div>
    <p id="pain-hint">1단계: 조금 불편 → 5단계: 매우 심함</p>
  </div>
</div>

<!-- 감정 -->
<div id="tab-emotion" class="panel">
  <p class="hint" style="margin-top:4px">지금 기분을 알려주세요</p>
  <div class="grid2">
    <button class="big-btn" style="background:#A5D6A7" onclick="say('괜찮아요')"><span class="ico">😊</span><span class="lbl">괜찮아요</span></button>
    <button class="big-btn" style="background:#90CAF9" onclick="say('슬퍼요')"><span class="ico">😢</span><span class="lbl">슬퍼요</span></button>
    <button class="big-btn" style="background:#EF9A9A" onclick="say('화나요')"><span class="ico">😡</span><span class="lbl">화나요</span></button>
    <button class="big-btn" style="background:#FFE082" onclick="say('불안해요')"><span class="ico">😰</span><span class="lbl">불안해요</span></button>
    <button class="big-btn" style="background:#BCAAA4" onclick="say('피곤해요')"><span class="ico">😴</span><span class="lbl">피곤해요</span></button>
    <button class="big-btn" style="background:#80CBC4" onclick="say('감사해요')"><span class="ico">🙏</span><span class="lbl">감사해요</span></button>
  </div>
  <p class="sec-title">가족에게 하고 싶은 말</p>
  <div class="grid2">
    <button class="big-btn" style="background:#F48FB1" onclick="say('사랑해요')"><span class="ico">❤️</span><span class="lbl">사랑해요</span></button>
    <button class="big-btn" style="background:#90CAF9" onclick="say('보고 싶었어요')"><span class="ico">😭</span><span class="lbl">보고 싶었어요</span></button>
    <button class="big-btn" style="background:#FFCC80" onclick="say('미안해요')"><span class="ico">🙇</span><span class="lbl">미안해요</span></button>
    <button class="big-btn" style="background:#A5D6A7" onclick="say('걱정 마세요')"><span class="ico">😌</span><span class="lbl">걱정 마세요</span></button>
  </div>
</div>

<footer>버튼을 누르면 소리로 읽어드려요 🔊</footer>

<script>
  let spokenTimer = null;
  let currentPart = "";

  function say(text) {
    if (window.speechSynthesis) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "ko-KR"; u.rate = 0.85;
      window.speechSynthesis.speak(u);
    }
    const bar = document.getElementById("spoken-bar");
    document.getElementById("spoken-text").textContent = text;
    bar.style.display = "block";
    clearTimeout(spokenTimer);
    spokenTimer = setTimeout(() => bar.style.display = "none", 3000);
  }

  function showTab(name) {
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.getElementById("tab-" + name).classList.add("active");
    event.currentTarget.classList.add("active");
  }

  function selectPart(part) {
    currentPart = part;
    document.getElementById("selected-part").textContent = part;
    document.getElementById("pain-parts").style.display = "none";
    document.getElementById("pain-level-section").style.display = "block";
  }

  function backToParts() {
    document.getElementById("pain-parts").style.display = "block";
    document.getElementById("pain-level-section").style.display = "none";
  }

  function sayPain(level) {
    say(currentPart + "이 " + level + "단계로 아파요");
  }

  // Service Worker 등록
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("./sw.js");
  }
</script>
</body>
</html>
